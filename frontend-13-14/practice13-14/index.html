<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел - PWA приложение</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4A90D9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Список дел">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
</head>

<body>
    <main class="container">
        <h1>Список дел</h1>
        <p class="text-muted">Ваше офлайн-приложение для управления задачами</p>

        <div id="status-bar" class="row" style="margin-bottom: 1rem;">
            <div class="col">
                <span id="connection-status" class="tag success">Онлайн</span>
                <span id="sw-status" class="tag primary">SW загружается...</span>
            </div>
        </div>

        <form id="task-form" class="row">
            <input class="col-9" type="text" id="task-input" placeholder="Введите задачу..." required>
            <button class="col-3 primary" type="submit">Добавить</button>
        </form>

        <div style="margin-top: 2rem;">
            <div class="row" style="margin-bottom: 1rem; align-items: center;">
                <div class="col">
                    <h3>Мои задачи (<span id="task-count">0</span>)</h3>
                </div>
                <div class="col-auto">
                    <button id="clear-completed" class="outline small">Удалить выполненные</button>
                    <button id="clear-all" class="outline small danger">Очистить всё</button>
                </div>
            </div>

            <ul id="task-list"></ul>

            <div id="empty-state" class="text-center" style="padding: 3rem; color: #aaa;">
                <p>Задач пока нет. Добавьте первую!</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
