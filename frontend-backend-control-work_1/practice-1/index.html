<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="card__image">
            <img src="img/asus_laptop.jpeg" alt="Игровой ноутбук">
        </div>
        <div class="card__content">
            <h2 class="card__title">Название товара</h2>
            <p class="card__description">
                Это описание товара, которое содержит информацию о его характеристиках и преимуществах.
            </p>
            <button class="card__button">Купить</button>
        </div>
    </div>
</body>
</html>
